<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>7K Music - Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      .card {
        max-width: 460px;
        margin: 24px;
        padding: 24px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.3rem;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.8);
      }

      a {
        color: #8fd8ff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You're offline</h1>
      <p>
        7K Music can still show some cached pages and thumbnails, but streaming playback needs an internet connection.
      </p>
      <p>
        Reconnect and <a href="/">return to Home</a>.
      </p>
    </main>
  </body>
</html>
